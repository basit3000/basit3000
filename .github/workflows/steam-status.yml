name: Update Steam Status

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-steam-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pillow

      - name: Generate Steam status image
        env:
          STEAM_ID: "76561198355636398"
          OUTPUT_PATH: assets/steam-now-playing.png
        run: python scripts/generate_steam_status.py

      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add assets/steam-now-playing.png
          git diff --staged --quiet || git commit -m "update steam now playing status"
          git push
