name: Update Spotify Status

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-spotify-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Spotify status SVG
        env:
          SPOTIFY_UID: "ic9zxmbzknyeuiza6yh988k8n"
          OUTPUT_PATH: assets/spotify-now-playing.svg
        run: python scripts/generate_spotify_status.py

      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add assets/spotify-now-playing.svg
          git diff --staged --quiet || git commit -m "update spotify now playing status"
          git push
